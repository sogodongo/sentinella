global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: sentinella-gateway
    static_configs:
      - targets: ["gateway:8080"]
    metrics_path: /metrics

  - job_name: sentinella-policy
    static_configs:
      - targets: ["policy:8081"]
    metrics_path: /metrics

  - job_name: sentinella-ledger
    static_configs:
      - targets: ["ledger:8082"]
    metrics_path: /metrics

  - job_name: sentinella-evals
    static_configs:
      - targets: ["evals:8083"]
    metrics_path: /metrics

  - job_name: sentinella-aibom
    static_configs:
      - targets: ["aibom:8084"]
    metrics_path: /metrics

  - job_name: opa
    static_configs:
      - targets: ["opa:8181"]
    metrics_path: /metrics
